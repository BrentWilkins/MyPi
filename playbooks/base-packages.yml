---
# Playbook 2: Base Tools
# Teaches: package lists, service module, idempotency

- name: Install base packages
  hosts: all
  become: true

  tasks:
    - name: Ensure avahi-daemon is installed
      ansible.builtin.apt:
        name: avahi-daemon
        state: present

    - name: Exclude Docker interfaces from avahi (avoid veth churn)
      ansible.builtin.lineinfile:
        path: /etc/avahi/avahi-daemon.conf
        regexp: '^#?deny-interfaces='
        line: 'deny-interfaces=docker0'
      notify: Restart avahi

    - name: Remove allow-interfaces restriction from avahi
      ansible.builtin.lineinfile:
        path: /etc/avahi/avahi-daemon.conf
        regexp: '^allow-interfaces='
        line: '#allow-interfaces=eth0'
      notify: Restart avahi

    - name: Ensure avahi-daemon is enabled and running
      ansible.builtin.service:
        name: avahi-daemon
        state: started
        enabled: true

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - vim
          - git
          - curl
          - htop
          - traceroute
          - net-tools
          - dnsutils
          - iputils-ping
        state: present

  handlers:
    - name: Restart avahi
      ansible.builtin.service:
        name: avahi-daemon
        state: restarted
