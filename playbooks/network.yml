---
# Playbook: network.yml — Hostname + Static IP via NetworkManager
# Teaches: hostname module, lineinfile, command module, set_fact, conditional tasks, handlers

- name: Configure hostname and static IP
  hosts: all
  become: true
  vars:
    static_ip: "10.0.0.102"
    prefix_length: "24"
    gateway: "10.0.0.1"
    dns_servers: "8.8.8.8 8.8.4.4"

  tasks:
    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

    - name: Update /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1\s+'
        line: "127.0.1.1 {{ inventory_hostname }}"
    - name: Get all WiFi connections
      ansible.builtin.command: nmcli -t -f NAME,TYPE con show
      register: nmcli_out
      changed_when: false

    - name: Parse WiFi connection name
      ansible.builtin.set_fact:
        wifi_conn: "{{ nmcli_out.stdout_lines | select('search', ':802-11-wireless') | first | split(':') | first }}"

    - name: Check current IPv4 method
      ansible.builtin.command: nmcli -t -f ipv4.method con show "{{ wifi_conn }}"
      register: ip_method
      changed_when: false

    - name: Set static IP on WiFi connection
      ansible.builtin.command: >-
        nmcli con mod "{{ wifi_conn }}"
        ipv4.method manual
        ipv4.addresses {{ static_ip }}/{{ prefix_length }}
        ipv4.gateway {{ gateway }}
        ipv4.dns "{{ dns_servers }}"
      when: "'manual' not in ip_method.stdout"
      notify: Reload connection

  handlers:
    - name: Reload connection
      ansible.builtin.command: nmcli con up "{{ wifi_conn }}"
      changed_when: true
      failed_when: false
