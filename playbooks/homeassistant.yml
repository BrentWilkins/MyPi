---
# Playbook: homeassistant.yml — Home Assistant in Docker
# HA requires host networking for mDNS/discovery to work properly.

- name: Deploy Home Assistant
  hosts: all
  become: true

  vars:
    ha_config_dir: /home/brent/homeassistant/config
    ha_compose_dir: /home/brent/homeassistant

  tasks:
    - name: Create HA config directory
      ansible.builtin.file:
        path: "{{ ha_config_dir }}"
        state: directory
        owner: brent
        group: brent
        mode: "0755"

    - name: Deploy docker-compose.yml
      ansible.builtin.copy:
        dest: "{{ ha_compose_dir }}/docker-compose.yml"
        owner: brent
        group: brent
        mode: "0644"
        content: |
          services:
            homeassistant:
              image: ghcr.io/home-assistant/home-assistant:stable
              container_name: homeassistant
              volumes:
                - {{ ha_config_dir }}:/config
              network_mode: host
              restart: unless-stopped
              privileged: true

    - name: Start Home Assistant
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ ha_compose_dir }}"
      register: compose_out
      changed_when: "'Started' in compose_out.stderr or 'Created' in compose_out.stderr"
